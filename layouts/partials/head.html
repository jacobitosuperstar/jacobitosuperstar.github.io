<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="light dark">

  <!-- restore forced theme before first paint -->
  <script>
    (function () {
      var theme = localStorage.getItem('theme');
      if (theme === 'light' || theme === 'dark') {
        document.documentElement.setAttribute('data-theme', theme);
      }
    })();
  </script>

  <!-- customized CSS -->
  {{ $style := resources.Get "css/main.css" }}
  {{ $style = $style | minify | fingerprint }}
  <link href="{{ $style.Permalink }}" rel="stylesheet">

  <!-- ****** faviconit.com faviconos ****** -->
  {{ $favicon := resources.Get "favicon/favicon-310.png" }}
  {{ $favicon = $favicon | fingerprint }}
  <link rel="shortcut icon" href="{{ $favicon.Permalink }}">
  <link rel="icon" type="image/png" href="{{ $favicon.Permalink }}">
  <link rel="apple-touch-icon" type="image/png" href="{{ $favicon.Permalink }}">
  <!-- ****** faviconit.com faviconos ****** -->

  <link rel="canonical" href="{{ .Permalink }}">

  <title>{{ if not .IsHome }}{{ .Title }} — {{ end }}{{ .Site.Title }}</title>

  <meta name="description" content="Personal page for my blog, CV and other posts that I wish to share in the page">

  <!-- OG / Social -->
  <meta property="og:title" content="{{ if not .IsHome }}{{ .Title }} — {{ end }}{{ .Site.Title }}">
  <meta property="og:description" content="{{ with .Description }}{{ . }}{{ else }}Personal page for my blog, CV and other posts that I wish to share in the page{{ end }}">
  <meta property="og:url" content="{{ .Permalink }}">
  <meta property="og:type" content="{{ if .IsHome }}website{{ else }}article{{ end }}">
  <meta name="twitter:card" content="summary">

</head>
