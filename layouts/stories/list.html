{{ define "content" }}

<div class="content-wrap">
  <div class="stories-grid">
  {{ range where (where .Site.RegularPages "Section" "stories") "Lang" .Language.Lang }}
    <div class="pop-card-outer pop-gold" style="height: 100%;"
      onclick="window.location='{{ .Permalink }}';">
      <div class="pop-card pop-gold pop-card--flush" style="height: 100%; display: flex; flex-direction: column;">

        {{ $image := .Resources.GetMatch .Params.image }}
        {{ if $image }}
          <div style="aspect-ratio: 16/9; overflow: hidden; background: black;">
            {{ $processed := $image.Fit "1200x675 webp" }}
            <img
              style="width: 100%; height: 100%; object-fit: cover;"
              src="{{ $processed.RelPermalink }}"
              width="{{ $processed.Width }}"
              height="{{ $processed.Height }}"
              loading="lazy"
              alt="{{ .Title }}"
            >
          </div>
          <div style="padding: 1.25rem; text-align: center; flex-grow: 1; display: flex; align-items: center; justify-content: center;">
            <h3 style="color: palegoldenrod; margin: 0; font-size: clamp(0.9rem, 0.8rem + 0.5vw, 1.2rem); text-transform: uppercase;">
              {{ .Title }}
            </h3>
          </div>
        {{ else }}
          <div style="padding: 2rem 1.25rem; text-align: center; display: flex; align-items: center; justify-content: center; min-height: 200px; flex-grow: 1;">
            <h2 style="color: palegoldenrod; margin: 0; font-size: clamp(1.1rem, 1rem + 0.5vw, 1.5rem); text-transform: uppercase;">
              {{ .Title }}
            </h2>
          </div>
        {{ end }}

      </div>
    </div>
  {{ end }}
  </div>
</div>

{{ end }}
