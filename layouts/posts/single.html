{{ define "content" }}

<div class="content-wrap">

  <h1 style="
    text-align: left;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 0.5rem;
  ">
    {{ .Title }}
  </h1>

  <div style="margin-bottom: 2rem;">
    <span style="
      color: var(--accent-soft);
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    ">
      {{ .Date.Format "January 2, 2006" }}
    </span>
  </div>

  {{ .Content }}

  <div style="margin-top: 2rem; padding-top: 1rem;">
    <b style="color: var(--accent);">Tags:</b>
    <span style="color: var(--link-soft);">{{ with .Params.tags }}{{ delimit . ", " }}{{ end }}</span>
  </div>

</div>

{{ end }}
