{{ define "content" }}

<div class="content-wrap">
  {{ range $index, $element := where (where .Site.RegularPages "Type" "posts") "Lang" .Language.Lang }}
  <div class="pop-card-outer {{ if modBool $index 2 }}pop-gold{{ end }}"
    style="margin-bottom: 2rem;"
    onclick="window.location='{{ .Permalink }}';">
    <div class="pop-card {{ if modBool $index 2 }}pop-gold{{ end }}">
      <h3 style="text-align: left; text-transform: uppercase; margin-bottom: 0.3rem;">
        <a
          href="{{ .Permalink }}"
          class="{{ if modBool $index 2 }}link-gold{{ else }}link-accent{{ end }}"
        >
          {{ .Title }}
        </a>
      </h3>
      <p style="color: var(--text-muted); font-size: 0.9rem; margin: 0 0 0.5rem 0;">
        {{ .Date.Format "02/01/2006" }}
      </p>
      <p style="color: var(--text-muted); font-size: 0.9rem; margin: 0;">
        <b style="color: {{ if modBool $index 2 }}var(--accent-2){{ else }}var(--accent){{ end }};">Tags:</b>
        {{ with .Params.tags }}{{ delimit . ", " }}{{ end }}
      </p>
    </div>
  </div>
  {{ end }}
</div>

{{ end }}
